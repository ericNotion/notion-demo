name: Update Prototypes

on:
  workflow_run:
    workflows: ["Vercel Production Deployment"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force_prototypes:
        description: "Comma-separated list of prototypes to force-sync (e.g. boss/lyon-v1,piamishra93/revisions-v5)"
        required: false
      test_user:
        description: "GitHub username to simulate as PR author"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Only run if the deploy succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0 # Full git history for PR lookup
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Sync prototype metadata to Notion (creates/updates/archives records)
      # Slack notifications are handled by a Notion automation that triggers
      # when new pages are created, sending a webhook to /api/slack-notify
      - name: Sync prototypes to Notion
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.force_prototypes }}" ]; then
            ARGS="$ARGS --force-prototypes=${{ github.event.inputs.force_prototypes }}"
          fi
          if [ -n "${{ github.event.inputs.test_user }}" ]; then
            ARGS="$ARGS --test-user=${{ github.event.inputs.test_user }}"
          fi
          bun run scripts/sync-to-notion.ts $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PROTOTYPES_DATABASE_ID: ${{ secrets.NOTION_PROTOTYPES_DATABASE_ID }}
